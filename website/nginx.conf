# =============================================================================
# Compass — nginx site config (HTTP, behind reverse proxy)
# =============================================================================
#
# This server listens on HTTP port 80. Your reverse proxy on the other server
# handles SSL and forwards traffic here.
#
# ── REVERSE PROXY ROUTING ────────────────────────────────────────────────────
# Point your reverse proxy upstream at:
#
#   http://THIS_SERVER_IP:80
#
# Typical nginx reverse proxy block on the OTHER server:
#
#   server {
#       listen 443 ssl;
#       server_name privatecompass.app www.privatecompass.app;
#       # ... your SSL cert config ...
#
#       location / {
#           proxy_pass         http://THIS_SERVER_IP:80;
#           proxy_set_header   Host              $host;
#           proxy_set_header   X-Real-IP         $remote_addr;
#           proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
#           proxy_set_header   X-Forwarded-Proto $scheme;
#       }
#   }
#
# ── SETUP INSTRUCTIONS ───────────────────────────────────────────────────────
# 1. Replace nothing — the domain is already set to privatecompass.app below.
# 2. Copy to sites-available:
#      cp /var/www/compass/website/nginx.conf /etc/nginx/sites-available/compass.conf
# 3. Enable:
#      ln -s /etc/nginx/sites-available/compass.conf /etc/nginx/sites-enabled/compass.conf
# 4. Validate and reload:
#      nginx -t && systemctl reload nginx
#
# ── VARIABLES TO FILL IN ─────────────────────────────────────────────────────
#   Domain: privatecompass.app (already set)
#   /var/www/compass   Where you cloned the repo. Change if different.
#
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name privatecompass.app www.privatecompass.app;

    # Document root is the website/ subfolder of the cloned repo
    root  /var/www/compass/website;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-Frame-Options         "DENY"                            always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Routing ──────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|ico|gif|jpg|jpeg|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── Compression ──────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types      text/html text/css text/plain application/javascript
                    application/json image/svg+xml;

    # ── Block hidden files and the config file itself ─────────────────────────
    location ~ /\. {
        deny all;
    }

    location = /nginx.conf {
        deny all;
    }
}

