<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 186 56">
  <defs>
    <radialGradient id="markBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#1C2E54"/>
      <stop offset="100%" stop-color="#070D1E"/>
    </radialGradient>
    <linearGradient id="markBezel" x1="15%" y1="5%" x2="85%" y2="95%">
      <stop offset="0%"   stop-color="#F0D068"/>
      <stop offset="40%"  stop-color="#C08A1C"/>
      <stop offset="100%" stop-color="#7C5208"/>
    </linearGradient>
    <radialGradient id="markHub" cx="33%" cy="28%" r="70%">
      <stop offset="0%"   stop-color="#F0D068"/>
      <stop offset="55%"  stop-color="#C08A1C"/>
      <stop offset="100%" stop-color="#7C5208"/>
    </radialGradient>
  </defs>

  <!-- ── Compass mark (centred at 28,28, r=24) ─────────────────── -->

  <!-- Background -->
  <circle cx="28" cy="28" r="24" fill="url(#markBg)"/>

  <!-- Bezel ring -->
  <circle cx="28" cy="28" r="21" fill="none"
          stroke="url(#markBezel)" stroke-width="1.6"/>

  <!-- Thin outer accent -->
  <circle cx="28" cy="28" r="23" fill="none"
          stroke="#C08A1C" stroke-width="0.6" opacity="0.35"/>

  <!-- Cardinal tick marks (tiny) -->
  <line x1="28" y1="8"  x2="28" y2="10.5" stroke="#F0D068" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="28" y1="45.5" x2="28" y2="48" stroke="#F0D068" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="8"  y1="28" x2="10.5" y2="28" stroke="#F0D068" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="45.5" y1="28" x2="48" y2="28" stroke="#F0D068" stroke-width="1.4" stroke-linecap="round"/>

  <!-- North needle — two-tone for depth                               -->
  <!-- Tip (28,10)  waist-L (25.5,26.5)  waist-R (30.5,26.5)  pivot (28,28) -->
  <path d="M28,10 L28,28 L25.5,26.5 Z" fill="#9C6E0E"/>
  <path d="M28,10 L30.5,26.5 L28,28 Z" fill="#FFD050"/>

  <!-- South needle — dark navy -->
  <path d="M28,46 L25.5,29.5 L28,28 Z" fill="#1C2E54"/>
  <path d="M28,46 L28,28  L30.5,29.5 Z" fill="#0A1428"/>

  <!-- East arm -->
  <path d="M46,28 L30.5,25.5 L28,28 L30.5,30.5 Z" fill="#C08A1C" opacity="0.88"/>

  <!-- West arm -->
  <path d="M10,28 L25.5,25.5 L28,28 L25.5,30.5 Z" fill="#C08A1C" opacity="0.88"/>

  <!-- Centre hub -->
  <circle cx="28" cy="28" r="4.2" fill="#050C1A"/>
  <circle cx="28" cy="28" r="3.3" fill="url(#markHub)"/>
  <circle cx="28" cy="28" r="1.9" fill="#050C1A"/>
  <circle cx="28" cy="28" r="0.9" fill="#F0D068" opacity="0.95"/>

  <!-- ── Logotype ─────────────────────────────────────────────────── -->
  <text
    x="60" y="35"
    font-family="Inter, 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="26" font-weight="600" letter-spacing="0.3"
    fill="#F0D068">Compass</text>
</svg>
