# =============================================================================
# Compass — Host Release Downloads
#
# Triggers when a stable release is published on GitHub. Runs on the nginx
# self-hosted runner, downloads the .exe, .msi, and (if present) .dmg from the
# GitHub release, places them in /var/www/compass/downloads/, and updates the
# stable symlinks:
#
#   Compass.exe  ->  Compass_x.x.x_x64-setup.exe
#   Compass.msi  ->  Compass_x.x.x_x64_en-US.msi
#   Compass.dmg  ->  Compass_x.x.x_universal.dmg   (only if the macOS build succeeded)
#
# The website download buttons point directly to:
#   https://privatecompass.app/downloads/Compass.exe
#   https://privatecompass.app/downloads/Compass.msi
#   https://privatecompass.app/downloads/Compass.dmg
#
# The .dmg is OPTIONAL — build.yml's macOS job (build-macos) runs with
# `continue-on-error: true` and can fail/skip its upload independently of the
# Windows build, so this workflow must never fail just because no .dmg exists
# yet in the release; it hosts whatever platform assets are actually present.
#
# Pre-releases (dev/feature branch builds) are ignored — only stable
# releases (IS_PRERELEASE=false in build.yml) trigger this workflow.
#
# ── WHY THIS ALSO NEEDS A MANUAL DISPATCH ────────────────────────────────────
# GitHub does NOT start new workflow runs from `release`/`push`/etc. events that
# were themselves produced via the API using the default GITHUB_TOKEN (this is
# an anti-recursion safeguard). scripts/publish-release.ps1 creates releases
# using GITHUB_TOKEN, so the `release: published` trigger below never actually
# fires for our own automated releases - it only fires for releases published
# by hand through the GitHub UI. `workflow_dispatch` IS explicitly exempt from
# that restriction, so build.yml's `dispatch-host-release` job calls this
# workflow's dispatch API directly (passing `tag_name`) once BOTH the Windows
# (create-compass) and macOS (build-macos) jobs have finished - that's the real
# trigger path for CI-published releases, and it guarantees the .dmg (when the
# macOS build succeeds) is already uploaded to the release before this runs.
#
# ── NGINX CONFIG REQUIRED (add to your server's compass.conf) ───────────────
# Add this location block inside your server {} block:
#
#   location /downloads/ {
#       alias /var/www/compass/downloads/;
#       add_header Content-Disposition "attachment";
#       autoindex off;
#   }
#
# ── SERVER SETUP (one-time) ──────────────────────────────────────────────────
#   mkdir -p /var/www/compass/downloads
#   # Ensure the runner user owns it:
#   chown -R YOUR_USERNAME:YOUR_USERNAME /var/www/compass/downloads
#
# ── NO EXTRA SECRETS NEEDED ──────────────────────────────────────────────────
# GITHUB_TOKEN is provided automatically. The repo is public so asset
# downloads work without authentication.
#
# ── CONFIG ───────────────────────────────────────────────────────────────────
# DOWNLOADS_DIR   Where installer files are stored and served from.
#                 Must match the alias path in your nginx location block.
#
# =============================================================================

name: Host Release Downloads

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to host (blank = latest stable release)"
        required: false

env:
  DOWNLOADS_DIR: /var/www/compass/downloads

jobs:
  host:
    name: Download and host release installers
    runs-on: [self-hosted, nginx]

    # Skip pre-releases (dev/feature builds). For workflow_dispatch there is
    # no release event, so the condition evaluates to true and runs regardless -
    # the script itself still checks the resolved release's `prerelease` flag
    # below and exits early if it's a prerelease, so an explicit/automated
    # dispatch for a dev build is still a no-op.
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}

    steps:
      - name: Ensure jq is available
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get install -y jq
          fi

      - name: Fetch release assets and host locally
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: tylahfam97/Compass
        run: |
          set -e
          mkdir -p "$DOWNLOADS_DIR"

          # Resolve which release to fetch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag_name }}" ]; then
            # Manual or automated dispatch for a specific tag (e.g. right after publish-release.ps1)
            RELEASE=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/tags/${{ inputs.tag_name }}")
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run with no tag specified: grab the latest stable release
            RELEASE=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/latest")
          else
            # Triggered by a release publish event
            RELEASE=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/tags/${{ github.event.release.tag_name }}")
          fi

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          IS_PRERELEASE=$(echo "$RELEASE" | jq -r '.prerelease')

          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "Release $TAG is a prerelease - skipping (dispatch was likely a dev/feature build)."
            exit 0
          fi

          echo "Hosting release $TAG"

          EXE_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("x64-setup.exe")) | .browser_download_url')
          MSI_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".msi"))          | .browser_download_url')
          EXE_NAME=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("x64-setup.exe")) | .name')
          MSI_NAME=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".msi"))          | .name')

          if [ -z "$EXE_URL" ] || [ "$EXE_URL" = "null" ]; then
            echo "ERROR: .exe asset not found in release $TAG"
            exit 1
          fi
          if [ -z "$MSI_URL" ] || [ "$MSI_URL" = "null" ]; then
            echo "ERROR: .msi asset not found in release $TAG"
            exit 1
          fi

          echo "Downloading $EXE_NAME ..."
          curl -L --progress-bar -o "$DOWNLOADS_DIR/$EXE_NAME" "$EXE_URL"

          echo "Downloading $MSI_NAME ..."
          curl -L --progress-bar -o "$DOWNLOADS_DIR/$MSI_NAME" "$MSI_URL"

          # Update the stable symlinks (atomic for nginx — no 404 window)
          ln -sf "$DOWNLOADS_DIR/$EXE_NAME" "$DOWNLOADS_DIR/Compass.exe"
          ln -sf "$DOWNLOADS_DIR/$MSI_NAME" "$DOWNLOADS_DIR/Compass.msi"

          # .dmg is OPTIONAL — the macOS job (build-macos) runs with continue-on-error and can
          # fail/skip its upload independently of the Windows build, so a missing .dmg here is
          # NOT an error; just skip hosting it and leave any previous Compass.dmg symlink as-is.
          DMG_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".dmg")) | .browser_download_url')
          DMG_NAME=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".dmg")) | .name')

          if [ -z "$DMG_URL" ] || [ "$DMG_URL" = "null" ]; then
            echo "No .dmg asset found in release $TAG - macOS build likely failed or was skipped. Skipping (not fatal)."
          else
            echo "Downloading $DMG_NAME ..."
            curl -L --progress-bar -o "$DOWNLOADS_DIR/$DMG_NAME" "$DMG_URL"
            ln -sf "$DOWNLOADS_DIR/$DMG_NAME" "$DOWNLOADS_DIR/Compass.dmg"
          fi

          echo ""
          echo "Done."
          echo "  $DOWNLOADS_DIR/Compass.exe  ->  $EXE_NAME"
          echo "  $DOWNLOADS_DIR/Compass.msi  ->  $MSI_NAME"
          if [ -n "$DMG_NAME" ] && [ "$DMG_NAME" != "null" ]; then
            echo "  $DOWNLOADS_DIR/Compass.dmg  ->  $DMG_NAME"
          fi

