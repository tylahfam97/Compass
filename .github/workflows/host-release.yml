# =============================================================================
# Compass — Host Release Downloads
#
# Triggers when a stable release is published on GitHub. Runs on the nginx
# self-hosted runner, downloads the .exe and .msi from the GitHub release,
# places them in /var/www/compass/downloads/, and updates the stable symlinks:
#
#   Compass.exe  ->  Compass_x.x.x_x64-setup.exe
#   Compass.msi  ->  Compass_x.x.x_x64_en-US.msi
#
# The website download buttons point directly to:
#   https://privatecompass.app/downloads/Compass.exe
#   https://privatecompass.app/downloads/Compass.msi
#
# Pre-releases (dev/feature branch builds) are ignored — only stable
# releases (IS_PRERELEASE=false in build.yml) trigger this workflow.
#
# ── NGINX CONFIG REQUIRED (add to your server's compass.conf) ───────────────
# Add this location block inside your server {} block:
#
#   location /downloads/ {
#       alias /var/www/compass/downloads/;
#       add_header Content-Disposition "attachment";
#       autoindex off;
#   }
#
# ── SERVER SETUP (one-time) ──────────────────────────────────────────────────
#   mkdir -p /var/www/compass/downloads
#   # Ensure the runner user owns it:
#   chown -R YOUR_USERNAME:YOUR_USERNAME /var/www/compass/downloads
#
# ── NO EXTRA SECRETS NEEDED ──────────────────────────────────────────────────
# GITHUB_TOKEN is provided automatically. The repo is public so asset
# downloads work without authentication.
#
# ── CONFIG ───────────────────────────────────────────────────────────────────
# DOWNLOADS_DIR   Where installer files are stored and served from.
#                 Must match the alias path in your nginx location block.
#
# =============================================================================

name: Host Release Downloads

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  DOWNLOADS_DIR: /var/www/compass/downloads

jobs:
  host:
    name: Download and host release installers
    runs-on: [self-hosted, nginx]

    # Skip pre-releases (dev/feature builds). For workflow_dispatch there is
    # no release event, so the condition evaluates to true and runs regardless.
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}

    steps:
      - name: Ensure jq is available
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get install -y jq
          fi

      - name: Fetch release assets and host locally
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: tylahfam97/Compass
        run: |
          set -e
          mkdir -p "$DOWNLOADS_DIR"

          # Resolve which release to fetch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run: grab the latest stable release
            RELEASE=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/latest")
          else
            # Triggered by a release publish event
            RELEASE=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/tags/${{ github.event.release.tag_name }}")
          fi

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          echo "Hosting release $TAG"

          EXE_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("x64-setup.exe")) | .browser_download_url')
          MSI_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".msi"))          | .browser_download_url')
          EXE_NAME=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("x64-setup.exe")) | .name')
          MSI_NAME=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith(".msi"))          | .name')

          if [ -z "$EXE_URL" ] || [ "$EXE_URL" = "null" ]; then
            echo "ERROR: .exe asset not found in release $TAG"
            exit 1
          fi
          if [ -z "$MSI_URL" ] || [ "$MSI_URL" = "null" ]; then
            echo "ERROR: .msi asset not found in release $TAG"
            exit 1
          fi

          echo "Downloading $EXE_NAME ..."
          curl -L --progress-bar -o "$DOWNLOADS_DIR/$EXE_NAME" "$EXE_URL"

          echo "Downloading $MSI_NAME ..."
          curl -L --progress-bar -o "$DOWNLOADS_DIR/$MSI_NAME" "$MSI_URL"

          # Update the stable symlinks (atomic for nginx — no 404 window)
          ln -sf "$DOWNLOADS_DIR/$EXE_NAME" "$DOWNLOADS_DIR/Compass.exe"
          ln -sf "$DOWNLOADS_DIR/$MSI_NAME" "$DOWNLOADS_DIR/Compass.msi"

          echo ""
          echo "Done."
          echo "  $DOWNLOADS_DIR/Compass.exe  ->  $EXE_NAME"
          echo "  $DOWNLOADS_DIR/Compass.msi  ->  $MSI_NAME"
