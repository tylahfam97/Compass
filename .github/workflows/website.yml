name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
  workflow_dispatch:

env:
  WEBSITE_PATH:  /var/www/compass
  DEPLOY_BRANCH: main
  NGINX_SERVICE: nginx

jobs:
  deploy:
    name: Deploy to nginx server
    runs-on: [self-hosted, nginx]

    steps:
      - name: Pull latest from GitHub
        run: |
          set -e
          cd "${{ env.WEBSITE_PATH }}"
          git fetch --prune origin
          git checkout "${{ env.DEPLOY_BRANCH }}"
          git pull origin "${{ env.DEPLOY_BRANCH }}"
          echo "Deploy complete — $(git log -1 --oneline)"

      - name: Reload nginx
        run: sudo systemctl reload "${{ env.NGINX_SERVICE }}"

