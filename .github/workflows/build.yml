name: Build Compass Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

# ── Bump APP_VERSION here to tag a new release ────────────────────────────────
env:
  APP_VERSION: "0.3.0"
# ──────────────────────────────────────────────────────────────────────────────

permissions:
  contents: write

jobs:
  build-windows:
    # self-hosted = your local machine running the GitHub Actions runner
    # Node.js and Rust are already installed there, no setup steps needed
    runs-on: self-hosted

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: npm install

      - name: Patch version from APP_VERSION
        shell: powershell
        run: |
          $v    = $env:APP_VERSION
          $repo = $env:GITHUB_REPOSITORY
          (Get-Content src-tauri\tauri.conf.json -Raw) `
            -replace '"version":\s*"[^"]*"', ('"version": "' + $v + '"') `
            -replace '__REPO__', $repo |
            Set-Content src-tauri\tauri.conf.json -NoNewline
          (Get-Content package.json -Raw) `
            -replace '"version":\s*"[^"]*"', ('"version": "' + $v + '"') |
            Set-Content package.json -NoNewline
          (Get-Content src-tauri\Cargo.toml -Raw) `
            -replace '(?m)^version\s*=\s*"[^"]*"', ('version = "' + $v + '"') |
            Set-Content src-tauri\Cargo.toml -NoNewline
          Write-Host "Patched version to $v and endpoint repo to $repo"
          
      - name: Build Tauri application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Publish release to GitHub
        shell: cmd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          APPRISE_DISCORD_URL: ${{ secrets.AppriseDiscordUrl }}
        run: powershell -ExecutionPolicy Bypass -File scripts\publish-release.ps1