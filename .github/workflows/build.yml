name: Build Compass Installer

on:
  push:
    branches:
      - main
      - dev
      - 'feat/**'

  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  create-compass:
    runs-on: [self-hosted, windows]

    defaults:
      run:
        shell: cmd

    steps:
      - name: Prune stale local refs (self-hosted runner)
        shell: powershell
        continue-on-error: true
        run: |
          if (Test-Path ".git") {
            git remote prune origin 2>$null
            # Remove local branch namespace directories left by deleted namespaced branches
            # e.g. .git\refs\heads\dev\ (directory) blocks creating branch 'dev' (file)
            $headsPath = Resolve-Path ".git\refs\heads" -ErrorAction SilentlyContinue
            if ($headsPath) {
              Get-ChildItem -Path $headsPath.Path -Directory | ForEach-Object {
                Write-Host "Removing stale branch namespace: $($_.Name)/"
                Remove-Item -Recurse -Force $_.FullName
              }
            }
          }

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: npm install

      - name: Read version and patch endpoint
        shell: powershell
        run: |
          # tauri.conf.json is the version source of truth — read it, don't overwrite it
          $v    = (Get-Content src-tauri\tauri.conf.json -Raw | ConvertFrom-Json).version
          $repo = $env:GITHUB_REPOSITORY
          # Export version for the publish script
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # Mark as prerelease on any branch other than main
          $branch = $env:GITHUB_REF_NAME
          $isPrerelease = if ($branch -eq "main") { "false" } else { "true" }
          "IS_PRERELEASE=$isPrerelease" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Branch: $branch | Prerelease: $isPrerelease"
          # Patch the updater endpoint placeholder
          (Get-Content src-tauri\tauri.conf.json -Raw) -replace '__REPO__', $repo |
            Set-Content src-tauri\tauri.conf.json -NoNewline
          # Keep Cargo.toml in sync
          (Get-Content src-tauri\Cargo.toml -Raw) `
            -replace '(?m)^version\s*=\s*"[^"]*"', ('version = "' + $v + '"') |
            Set-Content src-tauri\Cargo.toml -NoNewline
          Write-Host "Building version $v for $repo"
          
      - name: Build Tauri application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: powershell
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY is set (length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length))"
          } else {
            Write-Warning "TAURI_SIGNING_PRIVATE_KEY is NOT set - bundles will not be signed"
          }
          $cfg = Get-Content src-tauri\tauri.conf.json -Raw | ConvertFrom-Json
          $pubkey   = $cfg.plugins.updater.pubkey
          $endpoint = $cfg.plugins.updater.endpoints[0]
          Write-Host "Updater pubkey set: $($null -ne $pubkey -and $pubkey -ne '')"
          Write-Host "Updater endpoint: $endpoint"
          npm run tauri build

      - name: Create and sign update bundle
        continue-on-error: true
        env:
          COMPASS_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          COMPASS_SIGNING_PWD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: powershell
        run: |
          if (-not $env:COMPASS_SIGNING_KEY) { Write-Warning "No signing key - skipping"; exit 0 }

          # Skip if Tauri already created the bundle during build
          $existing = Get-ChildItem src-tauri\target\release\bundle\nsis\*.nsis.zip -ErrorAction SilentlyContinue
          if ($existing) { Write-Host "Update bundle already exists, skipping manual creation"; exit 0 }

          $nsisExe = Get-ChildItem src-tauri\target\release\bundle\nsis\*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsisExe) { Write-Warning "No NSIS exe found - skipping"; exit 0 }

          $zipPath = $nsisExe.FullName -replace '\.exe$', '.nsis.zip'

          # Write a raw STORE (method 0) ZIP manually — .NET Framework 4.x always
          # produces Deflate (method 8) even with NoCompression, which the Tauri
          # updater's zip crate (compiled without the deflate feature) can't read.
          $fileBytes = [IO.File]::ReadAllBytes($nsisExe.FullName)
          $nameBytes = [Text.Encoding]::UTF8.GetBytes($nsisExe.Name)
          $fileSize  = [uint32]$fileBytes.Length

          # CRC-32 (decimal literals avoid PowerShell 5.1 sign-extension of large hex values)
          $poly     = [long]3988292384   # 0xEDB88320
          $mask32   = [long]4294967295   # 0xFFFFFFFF
          $crcTable = 0..255 | ForEach-Object {
              $c = [long]$_
              for ($j = 0; $j -lt 8; $j++) {
                  if ($c -band 1) { $c = $poly -bxor ($c -shr 1) }
                  else             { $c = $c -shr 1 }
              }
              $c -band $mask32
          }
          [long]$crc = 4294967295
          foreach ($b in $fileBytes) { $crc = $crcTable[($crc -bxor $b) -band 255] -bxor ($crc -shr 8) }
          [uint32]$crc = ($crc -bxor $mask32) -band $mask32

          $ms = [IO.MemoryStream]::new()
          $bw = [IO.BinaryWriter]::new($ms)

          # Local file header — method 0x0000 = STORE
          $bw.Write([uint32]0x04034B50); $bw.Write([uint16]20); $bw.Write([uint16]0)
          $bw.Write([uint16]0)                        # compression method: STORE
          $bw.Write([uint16]0); $bw.Write([uint16]0)  # mod time/date
          $bw.Write([uint32]$crc)
          $bw.Write([uint32]$fileSize); $bw.Write([uint32]$fileSize)
          $bw.Write([uint16]$nameBytes.Length); $bw.Write([uint16]0)
          $bw.Write($nameBytes)
          $bw.Write($fileBytes)   # data immediately follows LFH; LFH starts at offset 0

          # Central directory entry — offset field = start of local file header = 0
          $cdOffset = [uint32]$ms.Position
          $bw.Write([uint32]0x02014B50); $bw.Write([uint16]0x0314); $bw.Write([uint16]20)
          $bw.Write([uint16]0); $bw.Write([uint16]0)  # method: STORE
          $bw.Write([uint16]0); $bw.Write([uint16]0)
          $bw.Write([uint32]$crc)
          $bw.Write([uint32]$fileSize); $bw.Write([uint32]$fileSize)
          $bw.Write([uint16]$nameBytes.Length); $bw.Write([uint16]0); $bw.Write([uint16]0)
          $bw.Write([uint16]0); $bw.Write([uint16]0); $bw.Write([uint32]0)
          $bw.Write([uint32]0); $bw.Write($nameBytes)   # LFH offset = 0 (first entry)
          $cdSize = [uint32]($ms.Position - $cdOffset)

          # End of central directory
          $bw.Write([uint32]0x06054B50); $bw.Write([uint16]0); $bw.Write([uint16]0)
          $bw.Write([uint16]1); $bw.Write([uint16]1)
          $bw.Write([uint32]$cdSize); $bw.Write([uint32]$cdOffset); $bw.Write([uint16]0)
          $bw.Flush()

          [IO.File]::WriteAllBytes($zipPath, $ms.ToArray())
          Write-Host "Created STORE zip: $([IO.Path]::GetFileName($zipPath)) ($([math]::Round((Get-Item $zipPath).Length/1KB))KB)"

          # Write key to temp file under neutral name — TAURI_SIGNING_PRIVATE_KEY must NOT be set
          # or the CLI treats it as --private-key and conflicts with --private-key-path
          $keyFile = [IO.Path]::GetTempFileName()
          [IO.File]::WriteAllText($keyFile, $env:COMPASS_SIGNING_KEY)

          npx tauri signer sign --private-key-path $keyFile --password $env:COMPASS_SIGNING_PWD $zipPath
          Remove-Item $keyFile -Force -ErrorAction SilentlyContinue

          if (Test-Path "$zipPath.sig") {
            Write-Host "Signed - $([IO.Path]::GetFileName($zipPath)).sig created"
          } else {
            Write-Warning "tauri signer sign did not produce a .sig file"
          }

      - name: Publish release to GitHub
        shell: cmd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          APPRISE_DISCORD_URL: ${{ secrets.AppriseDiscordUrl }}
          APPRISE_URL: ${{ secrets.APPRISE_URL }}
        run: powershell -ExecutionPolicy Bypass -File scripts\publish-release.ps1

  # macOS build - fully independent of create-compass (only depends on it so the GitHub
  # release already exists to upload into). `continue-on-error: true` at the job level means
  # a broken/unsigned mac build NEVER marks the overall run red or affects the Windows
  # release above, which always builds/publishes on its own regardless of this job's outcome.
  build-macos:
    needs: create-compass
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm install

      - name: Read version, patch endpoint, compute tag
        shell: bash
        run: |
          V=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "APP_VERSION=$V" >> "$GITHUB_ENV"
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then IS_PRERELEASE=false; else IS_PRERELEASE=true; fi
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_ENV"
          if [ "$IS_PRERELEASE" = "true" ]; then
            SANITIZED=$(echo "$BRANCH" | sed -E 's/[^a-zA-Z0-9]+/-/g; s/^-+|-+$//g' | tr 'A-Z' 'a-z')
            echo "TAG_NAME=v$V-$SANITIZED" >> "$GITHUB_ENV"
          else
            echo "TAG_NAME=v$V" >> "$GITHUB_ENV"
          fi
          node -e "
            const fs=require('fs'), p='src-tauri/tauri.conf.json';
            fs.writeFileSync(p, fs.readFileSync(p,'utf8').replace(/__REPO__/g, '${{ github.repository }}'));
          "
          echo "Building version $V for ${{ github.repository }}"

      - name: Resolve Apple secrets (treat "N/A" placeholders as unset)
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Until a real Apple Developer ID is plugged in, these secrets are placeholder "N/A"
          # values - normalize them (and any blank/whitespace-only value) to truly empty so the
          # build step below correctly treats this as "no signing configured" instead of trying
          # (and failing) to sign with garbage. Swapping in real secret values later needs no
          # workflow changes - this step just passes them through unchanged once they're real.
          for VAR in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            VAL="${!VAR}"
            NORMALIZED=$(echo "$VAL" | tr '[:upper:]' '[:lower:]' | xargs)
            if [ -z "$NORMALIZED" ] || [ "$NORMALIZED" = "n/a" ]; then
              echo "$VAR=" >> "$GITHUB_ENV"
            else
              echo "$VAR=$VAL" >> "$GITHUB_ENV"
            fi
          done

      - name: Build (unsigned unless a real Apple signing identity is configured)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "::warning::No Apple signing identity configured - building an UNSIGNED macOS bundle. Populate the APPLE_* secrets with real values once available; no workflow changes needed."
          else
            echo "Apple signing identity configured - building a signed/notarized macOS bundle."
          fi
          npm run tauri build -- --target universal-apple-darwin

      - name: Upload macOS assets to the release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: pwsh -File scripts/publish-macos-assets.ps1