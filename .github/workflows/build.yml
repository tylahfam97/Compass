name: Build Compass Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-compass:
    # self-hosted = your local machine running the GitHub Actions runner
    # Node.js and Rust are already installed there, no setup steps needed
    runs-on: self-hosted

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: npm install

      - name: Read version and patch endpoint
        shell: powershell
        run: |
          # tauri.conf.json is the version source of truth — read it, don't overwrite it
          $v    = (Get-Content src-tauri\tauri.conf.json -Raw | ConvertFrom-Json).version
          $repo = $env:GITHUB_REPOSITORY
          # Export version for the publish script
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # Patch the updater endpoint placeholder
          (Get-Content src-tauri\tauri.conf.json -Raw) -replace '__REPO__', $repo |
            Set-Content src-tauri\tauri.conf.json -NoNewline
          # Keep Cargo.toml in sync
          (Get-Content src-tauri\Cargo.toml -Raw) `
            -replace '(?m)^version\s*=\s*"[^"]*"', ('version = "' + $v + '"') |
            Set-Content src-tauri\Cargo.toml -NoNewline
          Write-Host "Building version $v for $repo"
          
      - name: Build Tauri application
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        shell: powershell
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY is set (length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length))"
          } else {
            Write-Warning "TAURI_SIGNING_PRIVATE_KEY is NOT set - bundles will not be signed"
          }
          $cfg = Get-Content src-tauri\tauri.conf.json -Raw | ConvertFrom-Json
          $pubkey   = $cfg.plugins.updater.pubkey
          $endpoint = $cfg.plugins.updater.endpoints[0]
          Write-Host "Updater pubkey set: $($null -ne $pubkey -and $pubkey -ne '')"
          Write-Host "Updater endpoint: $endpoint"
          npm run tauri build

      - name: Create and sign update bundle
        continue-on-error: true
        env:
          COMPASS_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          COMPASS_SIGNING_PWD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: powershell
        run: |
          if (-not $env:COMPASS_SIGNING_KEY) { Write-Warning "No signing key - skipping"; exit 0 }

          # Skip if Tauri already created the bundle during build
          $existing = Get-ChildItem src-tauri\target\release\bundle\nsis\*.nsis.zip -ErrorAction SilentlyContinue
          if ($existing) { Write-Host "Update bundle already exists, skipping manual creation"; exit 0 }

          $nsisExe = Get-ChildItem src-tauri\target\release\bundle\nsis\*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsisExe) { Write-Warning "No NSIS exe found - skipping"; exit 0 }

          $zipPath = $nsisExe.FullName -replace '\.exe$', '.nsis.zip'

          # Use .NET ZipArchive directly — guarantees STORE (method 0) compression,
          # which the Tauri updater's zip crate supports unconditionally
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zipStream   = [System.IO.File]::Create($zipPath)
          $archive     = New-Object System.IO.Compression.ZipArchive($zipStream, [System.IO.Compression.ZipArchiveMode]::Create, $false)
          $entry       = $archive.CreateEntry($nsisExe.Name, [System.IO.Compression.CompressionLevel]::NoCompression)
          $entryStream = $entry.Open()
          $srcStream   = [System.IO.File]::OpenRead($nsisExe.FullName)
          $srcStream.CopyTo($entryStream)
          $srcStream.Dispose(); $entryStream.Dispose(); $archive.Dispose(); $zipStream.Dispose()
          Write-Host "Created $([IO.Path]::GetFileName($zipPath)) ($([math]::Round((Get-Item $zipPath).Length/1KB))KB)"

          # Write key to temp file under neutral name — TAURI_SIGNING_PRIVATE_KEY must NOT be set
          # or the CLI treats it as --private-key and conflicts with --private-key-path
          $keyFile = [IO.Path]::GetTempFileName()
          [IO.File]::WriteAllText($keyFile, $env:COMPASS_SIGNING_KEY)

          npx tauri signer sign --private-key-path $keyFile --password $env:COMPASS_SIGNING_PWD $zipPath
          Remove-Item $keyFile -Force -ErrorAction SilentlyContinue

          if (Test-Path "$zipPath.sig") {
            Write-Host "Signed - $([IO.Path]::GetFileName($zipPath)).sig created"
          } else {
            Write-Warning "tauri signer sign did not produce a .sig file"
          }

      - name: Publish release to GitHub
        shell: cmd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          APPRISE_DISCORD_URL: ${{ secrets.AppriseDiscordUrl }}
        run: powershell -ExecutionPolicy Bypass -File scripts\publish-release.ps1