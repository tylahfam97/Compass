name: Build Compass Installer

on:
  push:
    branches:
      - main
  workflow_dispatch:

# ── Bump APP_VERSION here to tag a new release ────────────────────────────────
env:
  APP_VERSION: "0.1.0"
  GIT_SSL_NO_VERIFY: "true"
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  build-windows:
    runs-on: windows

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout repository
        run: |
          git clone https://oauth2:${{ secrets.GitHubToken }}@gitea.fameli.net/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri application
        run: npm run tauri build

      - name: Publish release to Gitea
        shell: cmd
        env:
          GITEA_TOKEN: ${{ secrets.GitHubToken }}
          GITEA_REPO: ${{ github.repository }}
        run: powershell -ExecutionPolicy Bypass -File scripts\publish-release.ps1
