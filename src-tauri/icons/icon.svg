<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep navy background -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#1C2E54"/>
      <stop offset="100%" stop-color="#070D1E"/>
    </radialGradient>
    <!-- Gold bezel -->
    <linearGradient id="bezel" x1="15%" y1="5%" x2="85%" y2="95%">
      <stop offset="0%"   stop-color="#F0D068"/>
      <stop offset="40%"  stop-color="#C08A1C"/>
      <stop offset="100%" stop-color="#7C5208"/>
    </linearGradient>
    <!-- North needle bright face -->
    <linearGradient id="northFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C08A1C"/>
      <stop offset="55%"  stop-color="#FFD050"/>
      <stop offset="100%" stop-color="#D09820"/>
    </linearGradient>
    <!-- Center hub -->
    <radialGradient id="hub" cx="33%" cy="28%" r="70%">
      <stop offset="0%"   stop-color="#F0D068"/>
      <stop offset="55%"  stop-color="#C08A1C"/>
      <stop offset="100%" stop-color="#7C5208"/>
    </radialGradient>
    <!-- Soft glow behind north needle -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer accent ring -->
  <circle cx="256" cy="256" r="244" fill="none"
          stroke="#C08A1C" stroke-width="1.5" opacity="0.35"/>

  <!-- Bezel ring -->
  <circle cx="256" cy="256" r="234" fill="none"
          stroke="url(#bezel)" stroke-width="6"/>

  <!-- Cardinal tick marks N / S / E / W  (r 228 → 213) -->
  <line x1="256" y1="28"  x2="256" y2="43"  stroke="#F0D068" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="256" y1="469" x2="256" y2="484" stroke="#F0D068" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="469" y1="256" x2="484" y2="256" stroke="#F0D068" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="28"  y1="256" x2="43"  y2="256" stroke="#F0D068" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Intercardinal tick marks NE / SE / SW / NW (r 228 → 216, 45°) -->
  <!-- r=228 @ 45°: 228×0.7071 ≈ 161  →  (417, 95)  -->
  <!-- r=216 @ 45°: 216×0.7071 ≈ 153  →  (409, 103) -->
  <line x1="417" y1="95"  x2="409" y2="103" stroke="#C08A1C" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="417" y1="417" x2="409" y2="409" stroke="#C08A1C" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="95"  y1="417" x2="103" y2="409" stroke="#C08A1C" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="95"  y1="95"  x2="103" y2="103" stroke="#C08A1C" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>

  <!-- ── Compass rose ─────────────────────────────────────────────── -->

  <!-- North needle — two facets give 3-D depth                       -->
  <!-- Tip (256,74)  waist-L (238,248)  waist-R (274,248)  pivot (256,256) -->
  <path d="M256,74 L256,256 L238,248 Z" fill="#9C6E0E"/>
  <path d="M256,74 L274,248 L256,256 Z" fill="url(#northFace)" filter="url(#glow)"/>

  <!-- South needle — dark navy shadow                                 -->
  <path d="M256,438 L238,264 L256,256 Z" fill="#1C2E54"/>
  <path d="M256,438 L256,256 L274,264 Z" fill="#0A1428"/>

  <!-- East accent arm -->
  <path d="M416,256 L268,240 L256,256 L268,272 Z" fill="#B07C10" opacity="0.88"/>

  <!-- West accent arm -->
  <path d="M96,256  L244,240 L256,256 L244,272 Z" fill="#B07C10" opacity="0.88"/>

  <!-- ── Centre hub ───────────────────────────────────────────────── -->
  <circle cx="256" cy="256" r="27" fill="#050C1A"/>
  <circle cx="256" cy="256" r="22" fill="url(#hub)"/>
  <circle cx="256" cy="256" r="13" fill="#050C1A"/>
  <circle cx="256" cy="256" r="7"  fill="#F0D068" opacity="0.95"/>
</svg>
